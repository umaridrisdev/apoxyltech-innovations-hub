services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: apoxyltech
      POSTGRES_PASSWORD: apoxyltech
      POSTGRES_DB: apoxyltech
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apoxyltech"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      # Server-side code (in Next.js Server Components) runs inside this
      # container and must reach the backend via its Docker network
      # hostname, not the browser-facing NEXT_PUBLIC_API_BASE_URL above.
      API_BASE_URL_INTERNAL: http://backend:8000/api
      NODE_ENV: development
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"

volumes:
  db_data:
